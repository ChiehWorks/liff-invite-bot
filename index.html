<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>光電AI助理</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; }
        
        /* 🎨【重點修改 1】：定義 Logo 的大小與呼吸動畫 */
        .brand-logo { 
            width: 80px; /* 這裡可以調整 Logo 顯示的寬度，視你的圖片比例修改 */
            height: auto;
            margin-bottom: 20px;
            /* 讓動畫執行名為 'breathe' 的效果，每次 2 秒，平滑進出，無限循環 */
            animation: breathe 2s ease-in-out infinite; 
        }
        
        /* 🎨【重點修改 2】：呼吸燈的動畫分鏡腳本 */
        @keyframes breathe { 
            /* 0% (開始)：微透明，略微縮小 */
            0% { opacity: 0.5; transform: scale(0.95); }
            /* 50% (中間)：完全不透明，略微放大 (吸氣膨脹的感覺) */
            50% { opacity: 1.0; transform: scale(1.05); }
            /* 100% (結束)：回到微透明，略微縮小 (呼氣收縮的感覺) */
            100% { opacity: 0.5; transform: scale(0.95); }
        }
        
        .status-text { color: #333; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    
    <img src="logo.png" class="brand-logo" id="loader" alt="傑作筆記 Logo">
    
    <div id="status" class="status-text">驗證資料中...</div>

    <script>
        // ==========================================
        const LIFF_ID = '2009537146-Ajd4v4RR'; 
        const N8N_WEBHOOK_URL = 'https://chiehworks-n8n.zeabur.app/webhook/4fff590d-9784-4723-8e00-0b75e32ad9f9'; 
        const LINE_BOT_URL = 'https://line.me/R/ti/p/@715kvjqb'; 
        // ==========================================

        const params = new URLSearchParams(window.location.search);
        const REF_CODE = params.get('ref') || 'none';

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                if (REF_CODE !== 'none') {
                    const profile = await liff.getProfile();
                    await fetch(N8N_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'referral_click',
                            referrer_code: REF_CODE,
                            new_user_id: profile.userId,
                            display_name: profile.displayName
                        })
                    });
                }

                document.getElementById('status').innerText = '準備跳轉...';
                window.location.href = LINE_BOT_URL;

            } catch (error) {
                document.getElementById('status').innerHTML = '🔴 系統異常，請稍後再試。';
                document.getElementById('loader').style.display = 'none';
                console.error(error);
            }
        }
        
        window.addEventListener('load', main);
    </script>
</body>
</html>
